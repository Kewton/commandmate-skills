schema_version: 1
id: cmate-acceptance-test
name: cmate-acceptance-test
version: 0.1.0
summary: Issue の受入条件を証跡付きで検証し、Go / Conditional Go / No-Go を versioned な result として返す。
description: |-
  対象 Issue の受入条件を自動検証と手動確認に分け、command exit code、test 結果、diff、手動観察を evidence として構造化したうえで、受入の可否を判定する手順である。
  未検証・環境依存・flaky・未承認を pass に丸めず、go / conditional_go / no_go を区別する。
  結果は schemas/acceptance-result.v1.json に適合する JSON と、離席後でも状態を復元できる human-readable summary の両方で返す。
  destructive・外部書き込み・high-risk な検証は、cleanup plan を添えた事前確認を経てからしか実行しない。
  実行する command は、この Skill 自身の gh / git（読み取り用途）と、利用者が入力として渡し確認したものに限る。実装や修正は行わない。
capabilities:
  - Issue の受入条件を抽出し、automated / manual / not_verifiable に分類する
  - 分類と risk に応じた test plan を提示し、危険な検証は cleanup plan つきで確認を取る
  - command exit code、test 結果、diff、手動観察を evidence として構造化する
  - pass / fail / flaky / blocked / not_run / manual_pending を区別して判定する
  - go / conditional_go / no_go を、決定表に従って再現可能に導出する
  - versioned な result document と human-readable summary を出力する
expected_outcomes:
  - 受入判断の根拠が、実行者の記憶ではなく evidence として残る
  - 未検証・環境依存・flaky・未承認が pass に丸められなくなる
  - 実行した check と実行しなかった check が、報告のうえで必ず分かれる
  - 離席後でも、未検証項目と次 action を result から復元できる
  - 破壊的な検証が、確認と cleanup plan を経てからしか実行されなくなる
provider:
  name: CommandMate
  url: https://github.com/Kewton/CommandMate
license: MIT
homepage: https://github.com/Kewton/commandmate-skills
keywords:
  - acceptance-test
  - verification
  - evidence
  - go-no-go
  - quality-gate
  - issue
compatibility:
  commandmate: '>=0.11.0 <1.0.0'
  agents:
    - agent: claude
      support: native
      evidence: Standard SKILL.md discovery from .agents/skills. Procedure uses no Claude-specific tool name.
    - agent: codex
      support: native
      evidence: Standard SKILL.md discovery from .agents/skills. Procedure uses no Codex-specific construct.
    - agent: gemini
      support: unknown
      evidence: Not verified for this version. Readable as a procedure, discovery and reload unverified.
    - agent: opencode
      support: unknown
      evidence: Not verified for this version. Readable as a procedure, discovery and reload unverified.
requirements:
  commands:
    - name: gh
    - name: git
  network_hosts:
    - api.github.com
    - github.com
declared_permissions:
  - filesystem_read
  - filesystem_write
  - process_execution
  - network_access
  - environment_read
declared_risk: moderate
risk_rationale: >-
  Executes processes by design: read-only gh and git, plus the project test
  commands the user passes in and confirms. Writes only the result document and
  the evidence directory. Network use is limited to reading the issue. Environment
  variables are checked for presence, never read into evidence. No script file and
  no executable file ships in this package.
