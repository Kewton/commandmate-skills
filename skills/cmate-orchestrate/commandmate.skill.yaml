schema_version: 1
id: cmate-orchestrate
name: cmate-orchestrate
version: 0.2.0
summary: 複数 Issue の並列実行を計画（dry-run）し、承認後に public commandmate で監督付きに実行する。計画は依存・conflict を分析し決定的な Wave plan を返し、実行は Wave barrier と verification gate で段階 dispatch する。
description: >-
  複数 Issue を並列で進めるための、計画（dry-run）と、その承認後の監督付き実行を行う標準手順である。
  同梱の deterministic planner（Node stdlib のみ）が、各 Issue の objective・受入条件・対象 file・
  blocking question を分析し、explicit と inferred の依存を区別し、cycle・不完全 override・依存順違反を
  拒否し、file 衝突のある Issue を同一 Wave に置かない Wave plan と merge 順、risk、要求権限、実行
  command を生成する。同じ入力からは同じ plan が出る（Claude/Codex parity）。run artifact は unique
  run ID 配下に生成し、既存 run を上書きしない。承認後は同梱の dispatch runner が、その plan を入力に
  取り、public commandmate で self-contained な generic worker を dispatch し、mutation 前に
  drift（branch/HEAD/worktree/permission）を再確認し、前 Wave の全 worker 完了と versioned
  verification report の pass を次 Wave dispatch の条件にする。worker completion と verification success
  は別々に判定し、prompt 検出時は自動応答せず停止して human へ提示する（Auto Yes は既定 off）。
  base branch・branch 名・worktree path・baseline は profile から解決し hardcode しない。PR 作成・
  merge・UAT 修正ループは後続 Issue の担当であり行わない。planner の default invocation は dry-run である。
capabilities:
  - GitHub Issue の objective・受入条件・suspected/reference file・blocking question を分析する
  - explicit（本文由来）と inferred（推論）の依存を区別して解決する
  - cycle・不完全 override・依存順違反を安全に検出して拒否する
  - file 衝突のある Issue を同一 Wave に置かない bounded な Wave plan を生成する
  - 同一入力から決定的な plan・run_id を返し、既存 run を上書きしない
  - 承認済み plan を public commandmate で dispatch し、self-contained な generic worker を実行する
  - Wave barrier（前 Wave 全完了）と verification gate（versioned report の pass）で監督する
  - prompt 検出時は自動応答せず停止して human へ提示する（Auto Yes default off）
  - worker completion と verification success を分離し、mutation 前に drift を再確認する
expected_outcomes:
  - 承認前に、依存と file 衝突を踏まえた並列実行計画が file/Wave 単位で確認できる
  - 危険な依存グラフ（cycle・不完全 override）が計画段階で止まる
  - 同じ入力を別 Agent で回しても同じ plan が再現でき、突き合わせられる
  - 承認済み plan を監督付きで段階実行でき、Wave barrier と verification gate で安全に進む
  - prompt は自動応答されず human 判断に委ねられ、worker 完了と検証成功が別々に判定される
provider:
  name: CommandMate
  url: https://github.com/Kewton/CommandMate
license: MIT
homepage: https://github.com/Kewton/commandmate-skills
keywords:
  - orchestration
  - planning
  - dry-run
  - dependency
  - wave
  - parallel
  - issue
compatibility:
  commandmate: '>=0.11.0 <1.0.0'
  agents:
    - agent: claude
      support: native
      evidence: Standard SKILL.md discovery from .agents/skills. Plan is produced by a bundled Node runner, so it is Agent-agnostic.
    - agent: codex
      support: native
      evidence: Standard SKILL.md discovery from .agents/skills. Same deterministic runner yields the same plan (parity).
    - agent: gemini
      support: unknown
      evidence: Not verified for this version. Readable as a procedure, discovery and reload unverified.
    - agent: opencode
      support: unknown
      evidence: Not verified for this version. Readable as a procedure, discovery and reload unverified.
requirements:
  commands:
    - name: commandmate
    - name: git
    - name: gh
    - name: node
      version_range: '>=22.0.0'
  network_hosts:
    - api.github.com
    - github.com
declared_permissions:
  - filesystem_read
  - filesystem_write
  - process_execution
  - network_access
declared_risk: high
risk_rationale: >-
  Ships executable runners, which CommandMate rates high risk. The planner only
  reads issues and writes a dry-run plan. The dispatch runner mutates: it sends
  work to real workers via public commandmate, guarded by a pre-wave drift
  re-check, a wave barrier, a versioned verification gate, human-in-the-loop
  prompts (Auto Yes off by default), and a worktree path-escape guard. PR, merge
  and UAT are deferred. Tokens, secrets, absolute paths and raw terminal output
  are redacted from every artifact.
