schema_version: 1
id: cmate-orchestrate
name: cmate-orchestrate
version: 0.7.0
summary: 複数 Issue の並列実行を dry-run で計画し、承認後に public commandmate で Wave barrier・verification gate 付きに dispatch、pass 後は承認と CI の 2 gate で PR 作成・guarded merge、納品後は UAT を実行し不合格なら回数上限つき修正ループを回し上限到達時は blocked で停止する。
description: >-
  複数 Issue を並列で進めるための、計画（dry-run）・その承認後の監督付き実行・verification pass 後の
  納品（PR 作成・CI 確認・guarded merge）・納品後の受入（UAT と回数上限つき修正ループ）を行う標準
  手順である。同梱の deterministic planner（Node stdlib のみ）が、各 Issue の objective・受入条件・対象
  file・blocking question を分析し、explicit と inferred の依存を区別し、cycle・不完全 override・依存順
  違反を拒否し、file 衝突のある Issue を同一 Wave に置かない Wave plan と merge 順、risk、要求権限、実行
  command を生成する。同じ入力からは同じ plan が出る（Claude/Codex parity）。run artifact は unique run
  ID 配下に生成し、既存 run を上書きしない。承認後は同梱の dispatch runner が、その plan を入力に取り、
  public commandmate（worktree-id ベースの send/wait/capture）で self-contained な generic worker を
  dispatch し、mutation 前に drift（branch/HEAD/permission）を再確認し、前 Wave の全 worker 完了と、
  worktree 内で profile baseline を再実行した pass を次 Wave dispatch の条件にする。worker completion と
  verification success は別々に判定し、prompt
  検出時は自動応答せず停止して human へ提示する（Auto Yes は既定 off）。納品は同梱の merge runner が、
  dispatch report で verification pass した Issue だけを対象に、CommandAgent の explicit phase flag 設計
  （--create-prs / --merge-prs）を踏襲して 1 invocation で 1 mutating phase だけを有効化し、明示承認
  （--approve）無しに push・PR 作成・merge をせず、CI pass 無しに merge しない。受入は同梱の uat runner
  が、同じ verification-passed 集合に UAT を実行し（--write-uat）、不合格なら CommandAgent の
  --create-uat-fix-worktrees 相当の phase で fix worktree 作成（#1448 worktree-result 整合）→修正→
  再検証→再merge を --max-attempts の回数上限つきで繰り返し、上限到達でなお不合格なら blocked として
  停止して成功に丸めない。PR 作成失敗・CI failure・merge conflict・UAT 失敗は blocked/partial として停止
  し、attempt 履歴は既存 run artifact を上書きせず append する。base branch・branch 名・worktree path・
  baseline は profile から解決し hardcode しない。Issue 本文編集・回数無制限ループ・crash 後の resume は
  行わない。planner の default invocation は dry-run である。
capabilities:
  - GitHub Issue の objective・受入条件・suspected/reference file・blocking question を分析する
  - explicit（本文由来）と inferred（推論）の依存を区別して解決する
  - cycle・不完全 override・依存順違反を安全に検出して拒否する
  - file 衝突のある Issue を同一 Wave に置かない bounded な Wave plan を生成する
  - 同一入力から決定的な plan・run_id を返し、既存 run を上書きしない
  - 承認済み plan を public commandmate で dispatch し、Wave barrier と verification gate で監督する（prompt 検出時は自動応答せず停止）
  - worker completion と verification success を分離し、mutation 前に drift を再確認する
  - verification pass した Issue を、明示承認と CI pass の 2 gate の下で 1 invocation 1 phase で PR 作成・guarded merge する
  - 納品後の UAT 不合格を、fix worktree→修正→再検証→再merge の回数上限つき修正ループで修復し、上限到達時は blocked として停止する
  - PR/CI/merge/UAT の失敗を success に丸めず blocked/partial として記録し、attempt 履歴を上書きせず append する
expected_outcomes:
  - 承認前に、依存と file 衝突を踏まえた並列実行計画が file/Wave 単位で確認できる
  - 危険な依存グラフ（cycle・不完全 override）が計画段階で止まる
  - 同じ入力を別 Agent で回しても同じ plan が再現でき、突き合わせられる
  - 承認済み plan を監督付きで段階実行でき、Wave barrier と verification gate で安全に進む
  - prompt は自動応答されず human 判断に委ねられ、worker 完了と検証成功が別々に判定される
  - verification pass した Issue が、明示承認と CI pass の 2 gate の下でのみ PR 作成・merge される
  - PR 作成失敗・CI failure・merge conflict が success に丸められず、blocked/partial として記録される
  - 納品後の UAT 不合格が、回数上限つきの修正ループ（fix worktree→修正→再検証→再merge）で自動修復を試みられる
  - 修正ループが上限で停止したことが blocked として明示され、未解決 Issue と next action が後から検証できる
provider:
  name: CommandMate
  url: https://github.com/Kewton/CommandMate
license: MIT
homepage: https://github.com/Kewton/commandmate-skills
keywords:
  - orchestration
  - planning
  - dry-run
  - dependency
  - wave
  - parallel
  - issue
compatibility:
  commandmate: '>=0.11.0 <1.0.0'
  agents:
    - agent: claude
      support: unknown
      evidence: Claude reads SKILL.md from .claude/skills, not .agents/skills. The CommandMate installer places packages in .agents/skills only for now (see CommandMate issue 1460); native discovery for this version is not yet measured (see issue 1246).
    - agent: codex
      support: native
      evidence: Standard SKILL.md discovery from .agents/skills. Same deterministic runner yields the same plan (parity).
    - agent: gemini
      support: unknown
      evidence: Not verified for this version. Readable as a procedure, discovery and reload unverified.
    - agent: opencode
      support: unknown
      evidence: Not verified for this version. Readable as a procedure, discovery and reload unverified.
requirements:
  commands:
    - name: commandmate
    - name: git
    - name: gh
    - name: node
      version_range: '>=22.0.0'
  network_hosts:
    - api.github.com
    - github.com
declared_permissions:
  - filesystem_read
  - filesystem_write
  - process_execution
  - network_access
declared_risk: high
risk_rationale: >-
  Ships executable runners (high risk). The planner only reads issues and writes a
  dry-run plan. The dispatch runner mutates via commandmate, guarded by a drift
  re-check, a wave barrier, a verification gate and halted prompts. The merge runner
  opens PRs and merges verified issues only, never without explicit approval and
  green CI. The UAT runner repairs UAT failures within a fixed cap, stopping as
  blocked and appending attempts without overwriting the artifact. Secrets and paths
  are redacted.
